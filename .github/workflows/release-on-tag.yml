name: Release On Tag

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build release notes and zip asset
        shell: bash
        run: |
          set -euo pipefail

          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREVIOUS_TAG="$(git describe --tags --match 'v[0-9]*.[0-9]*.[0-9]*' --abbrev=0 "${CURRENT_TAG}^" 2>/dev/null || true)"

          {
            echo "## Changes"
            echo

            if [[ -n "${PREVIOUS_TAG}" ]]; then
              echo "Commits since ${PREVIOUS_TAG}:"
              echo
              git log --pretty=format:'- %s (%h)' "${PREVIOUS_TAG}..${CURRENT_TAG}"
            else
              echo "Commits in this release:"
              echo
              git log --pretty=format:'- %s (%h)' "${CURRENT_TAG}"
            fi
          } > RELEASE_NOTES.md

          ZIP_NAME="internautengraph-${CURRENT_TAG}.zip"
          zip -r "${ZIP_NAME}" internautengraph
          echo "ZIP_NAME=${ZIP_NAME}" >> "${GITHUB_ENV}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file RELEASE_NOTES.md \
            "${ZIP_NAME}"